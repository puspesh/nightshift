<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="100" rx="8" fill="#0d1117"/>
  <!-- Moon icon -->
  <circle cx="45" cy="50" r="16" fill="#58a6ff" opacity="0.9" filter="url(#glow)"/>
  <circle cx="53" cy="44" r="13" fill="#0d1117"/>
  <!-- Stars -->
  <circle cx="30" cy="28" r="1.5" fill="#58a6ff" opacity="0.6"/>
  <circle cx="68" cy="32" r="1" fill="#58a6ff" opacity="0.4"/>
  <circle cx="22" cy="45" r="1" fill="#58a6ff" opacity="0.5"/>
  <!-- Text -->
  <text x="85" y="58" font-family="'SF Mono','Cascadia Code','Fira Code',monospace" font-size="32" font-weight="700" fill="#c9d1d9" letter-spacing="1" filter="url(#glow)">nightshift</text>
  <!-- Subtle tagline -->
  <text x="85" y="76" font-family="'SF Mono','Cascadia Code','Fira Code',monospace" font-size="11" fill="#8b949e">ai agents for your dev pipeline</text>
</svg>
